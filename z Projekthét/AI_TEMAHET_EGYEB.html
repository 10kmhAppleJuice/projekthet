<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="never">
    <title>AI - Aesthetic Dark Theme</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            padding: 20px;
            text-align: center;
            background: #1f1f1f;
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
        }
        main {
            padding: 20px;
            text-align: center;
        }
        footer {
            padding: 20px;
            text-align: center;
            background: #1f1f1f;
        }
        a {
            color: #bb86fc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        h1 {
        margin: 0;
        font-size: 2.5em;
        color: #5bc3ec;
        text-shadow: 0 0 10px #bb86fc66;
        }
        header, footer {
        transition: 0.3s ease;
        }
        header:hover, footer:hover {
        background: #292929;
        }
        td {
        padding: 8px 20px;
        color: hsl(0, 0%, 100%);
        }
        table {
        margin: 0 auto;
        border-collapse: collapse;
        }
        td {
        padding: 8px 20px;
        }
        table {
        margin: 0 auto;
        border-collapse: collapse;
        }
        td {
        padding: 8px 20px;
        }
        .video-container {
        position: relative;
        width: 100%;
        max-width: 800px;
        margin: auto;
        padding-bottom: 56.25%;
        height: 0;
        }
        .video-container iframe {
        position: absolute;
        width: 100%;
        height: 100%;
        left: 0;
        top: 0;
        border: 0;
        }
        @keyframes gradientMove {
        0% { background-position: 0% }
        100% { background-position: 200% }
        }
        h1, h2, h3, td, a {
        background: linear-gradient(90deg, #bb86fc, #03dac6, #ff0266, #bb86fc);
        background-size: 200%;
        animation: gradientMove 5s linear infinite;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        }
        
    </style>
</head>
<body>
    <header>
        <h1>Artificial Intelligence</h1>
    </header>
    <main>
        <h2>AI és egyeb tantárgyak</h2>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/SXqHDbf5v9c" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share;" allowfullscreen; ></iframe>

    </main>
    <footer id="footer">
		<h3>Készítették:</h3>
		<table>
			<tr>
				<td class="">Bódi Szabolcs</td>
				<td class="">Bodó Zsombor Gábor</td>
			</tr>
			<tr>
				<td class="">Kabai Tibor</td>
				<td class="">Keczkó Roland István</td>
			</tr>
		</table>
	</footer>
</body>
</html>
